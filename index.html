    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Online Calculator</title>
        <link rel="stylesheet" href="styles.css">
        <script src="script.js" defer></script>
        <style>@import url('https://fonts.cdnfonts.com/css/calculator');</style>
    </head>
    <body>

        <div class="body">
            <div class="screenAndButtonsContainer">
                <div class="screen">
                    <div class="numbers">Welcome :&#41;</div>
                </div>
                <div class="buttonContainer">
                    <button class="calcButton utility negative">+/-</button>
                    <button class="calcButton utility allClear">AC</button>
                    <button class="calcButton utility backspace"><img src="backspace.png" class="backspace"></button>
                    <button class="calcButton operator multiply">X</button>
                    <button class="calcButton seven numButtons">7</button>
                    <button class="calcButton eight numButtons">8</button>
                    <button class="calcButton nine numButtons">9</button>
                    <button class="calcButton operator divide">/</button>
                    <button class="calcButton four numButtons">4</button>
                    <button class="calcButton five numButtons">5</button>
                    <button class="calcButton six numButtons">6</button>
                    <button class="calcButton operator plus">+</button>
                    <button class="calcButton one numButtons">1</button>
                    <button class="calcButton two numButtons">2</button>
                    <button class="calcButton three numButtons">3</button>
                    <button class="calcButton operator minus">-</button>
                    <button class="calcButton zero numButtons">0</button>
                    <button class="calcButton utility period numButtons">.</button>
                    <button class="calcButton double operator equals">=</button>
                </div>
            </div>
        </div>
        
    </body>
    </html>
